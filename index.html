<!DOCTYPE html>
<html>
<head>
<title>Goal Mountain Pro++</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  font-family: system-ui;
}

/* NAVBAR */
.navbar {
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 8px;
  background: rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-weight: bold;
}

/* LAYOUT */
.app {
  display: flex;
  height: calc(100vh - 60px);
}

.goalIcon {
  width: 16px;
  height: 16px;
  object-fit: contain;
  filter: brightness(1.2); /* makes it visible on dark bg */
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-right: 1px solid rgba(255,255,255,0.1);
}

.goal {
  padding: 10px;
  margin: 5px 0;
  background: rgba(220, 208, 208, 0.08);
  border-radius: 8px;
  cursor: pointer;
}

.goal.active {
  background: #16a34a;
}

.goalItem {
  display: flex;
  align-items: center;
  justify-content: space-between; /* IMPORTANT */
}

.goal.active img {
  filter: brightness(2);
}

/* FIX ICON SIZE */
svg.lucide {
  width: 18px;
  height: 18px;
}

/* SEGMENT BATTERY */
/* PROFESSIONAL BATTERY */
.battery {
  width: 100%;
  height: 28px;              /* ↓ reduced from ~44 */
  border-radius: 8px;
  padding: 3px;              /* ↓ tighter */
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: inset 0 0 6px rgba(0,0,0,0.4);
}

.battery-level {
  display: flex;
  gap: 5px;                 /* ↓ smaller gap */
  height: 100%;
}

.segment {
  flex: 1;
  border-radius: 4px;       /* ↓ sharper look */
  background: #1e293b;
  transition: all 0.3s ease;
}

/* glow fill */
.segment.active::after {
  content: "";
  position: absolute;
  inset: 0;
  background: inherit;
  opacity: 0.8;
  filter: blur(6px);
}

/* COLORS */
.red {
  background: linear-gradient(180deg,#ef4444,#7f1d1d);
}

.yellow {
  background: linear-gradient(180deg,#facc15,#854d0e);
}

.green {
  background: linear-gradient(180deg,#22c55e,#14532d);
}

.batteryText {
  margin-top: 5px;          /* ↓ closer to battery */
  font-size: 12px;          /* ↓ smaller text */
  color: #cbd5f5;
}
/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

input, button {
  padding: 8px;
  border-radius: 6px;
  border: none;
  margin: 5px;
}

button {
  background: #16a34a;
  color: white;
}

/* GRAPH */
svg {
  width: 100%;
  height: 340px;
  background: #020617;
  border-radius: 12px;
}

.goalInput{
  background: rgba(220, 208, 208, 0.08);
  color: #e2e8f0;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
}

.goalItem {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.goalLeft {
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon {
  width: 20px;
  height: 20px;
}

.miniBattery {
  display: flex;
  gap: 2px;
}

.miniSeg {
  width: 6px;
  height: 14px;
  border-radius: 2px;
  background: #1e293b;
  transition: all 0.3s ease;
}

.miniSeg.red { background: #ef4444; }
.miniSeg.yellow { background: #facc15; }
.miniSeg.green { background: #22c55e; }

.deleteIcon {
  width: 18px;
  height: 18px;
  color: #f87171;          /* brighter red */
  cursor: pointer;
  opacity: 1;
  padding: 4px;
  border-radius: 6px;
  object-fit: contain;

  stroke-width: 2.5;       /* 🔥 thicker icon */
  transition: all 0.2s ease;
}



.deleteIcon:hover {
  color: black;
  opacity: 1;
  transform: scale(1.2);
  filter: drop-shadow(0 0 6px rgba(239,68,68,0.6));
  background: rgba(239,68,68,0.15);
}

.logoImg {
  height: 26px;   /* was ~34 → reduced */
  width: auto;
  object-fit: contain;

  margin-right: 6px;

  /* keep it sharp but not glowing too much */
  filter: brightness(1.05) contrast(1.05);
   height: 32px;
  opacity: 0.9;
  filter: drop-shadow(0 0 6px rgba(34,197,94,0.3));
}

.value {
  font-size: 18px;
  font-weight: bold;
  color: #e2e8f0;
}

.label {
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="navbar">
  <img src="icons/mountain.png" class="logoImg">
  <span>Goal Mountain Pro++</span>
</div>

<div class="app">

<div class="sidebar">
  <h3>Goals</h3>
  <div id="goalList"></div>
   <br>
  <h3>Add New Task</h3>
  <input class="goalInput" id="goalInput" placeholder="New goal">
  <button onclick="addGoal()">Add</button>

</div>

<div class="main">

  <h2 id="goalTitle">Select Goal</h2>

  <input class="goalInput" id="taskName" placeholder="Task">
  <input class="goalInput" id="difficulty" type="number" placeholder="1-10">
  <button onclick="addTask()">Add Task</button>

  <svg id="mountain"></svg>

  <div class="stats">
    <div class="card">
      <i data-lucide="check-circle" class="icon"></i>
      <div>
        <div class="label">Completed</div>
        <div class="value" id="completedCount">0</div>
      </div>
    </div>

    <div class="card">
      <i data-lucide="zap" class="icon"></i>
      <div>
        <div class="label">Current</div>
        <div class="value" id="currentTask">-</div>
      </div>
    </div>

    <div class="card">
      <i data-lucide="clock" class="icon"></i>
      <div>
        <div class="label">Pending</div>
        <div class="value" id="pendingCount">0</div>
      </div>
    </div>

    <div class="card">
      <i data-lucide="activity" class="icon"></i>
      <div>
        <div class="label">Progress</div>
        <div class="value" id="progressPercent">0%</div>
      </div>
    </div>
  </div>

</div>
</div>

<script>
let goals = JSON.parse(localStorage.getItem("goals")) || [];
let currentGoalIndex = null;

function addGoal() {
  const name = goalInput.value;
  if (!name) return;
  goals.push({ title: name, tasks: [] });
  goalInput.value = "";
  save();
  renderGoals();
}

function getPoints(tasks, width, height) {
  const paddingX = 50;
  const paddingY = 40;

  const usableWidth = width - paddingX * 2;
  const stepX = tasks.length > 1 ? usableWidth / (tasks.length - 1) : 0;

  return tasks.map((t, i) => {
    const x = paddingX + i * stepX;

    // scale difficulty dynamically
    const y =
      height -
      paddingY -
      (Math.min(t.difficulty, 10) / 10) * (height - 100);

    return { x, y };
  });
}

function generateMiniBattery(tasks) {
  if (!tasks.length) return "";

  const completed = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const progress = completed / total;

  const segments = 5;
  const active = Math.round(progress * segments);

  // 🔥 RANGE BASED COLOR
  const percent = progress * 100;

  let color = "red";
  if (percent > 30 && percent <= 60) color = "yellow";
  else if (percent > 60) color = "green";

  let html = "";

  for (let i = 0; i < segments; i++) {
    html += `<div class="miniSeg ${i < active ? color : ""}"></div>`;
  }

  return html;
}

function renderGoals() {
  goalList.innerHTML = "";

  goals.forEach((g, i) => {
    const div = document.createElement("div");
    div.className = "goal " + (i === currentGoalIndex ? "active" : "");

    div.innerHTML = `
    <div class="goalItem">

      <div class="goalLeft">
        <img src="icons/goal.png" class="goalIcon">
        <span>${g.title}</span>
      </div>

      <div style="display:flex; align-items:center; gap:10px;">
        <div class="miniBattery">
          ${generateMiniBattery(g.tasks)}
        </div>

        <!-- DELETE BUTTON -->
        <img src="icons/trash.png" class="deleteIcon">
      </div>

    </div>
  `;

    // delete button
    div.querySelector(".deleteIcon").onclick = (e) => {
      e.stopPropagation(); // prevent selecting goal

      if (confirm("Delete this goal?")) {
        goals.splice(i, 1);

        // reset selection safely
        if (currentGoalIndex === i) currentGoalIndex = null;
        else if (currentGoalIndex > i) currentGoalIndex--;

        save();
        renderGoals();
        renderMountain();
      }
    };

    div.onclick = () => {
      currentGoalIndex = i;
      renderGoals();
      renderMountain();
    };

    goalList.appendChild(div);
  });
}

function addTask() {
  if (currentGoalIndex === null) return;

  const name = taskName.value;
  const difficulty = parseInt(document.getElementById("difficulty").value);

  if (!name || !difficulty) return;

  goals[currentGoalIndex].tasks.push({ name, difficulty, done: false });

  taskName.value = "";
  document.getElementById("difficulty").value = "";

  save();
renderGoals();      // 🔥 THIS WAS MISSING
renderMountain();
}


function renderMountain() {
  const svg = document.getElementById("mountain");
  svg.innerHTML = "";

  if (currentGoalIndex === null) return;

  const goal = goals[currentGoalIndex];
  goalTitle.innerText = goal.title;

  const tasks = goal.tasks;
  if (!tasks.length) return;

  const width = svg.clientWidth;
  const height = 340;

  const padding = 60;
  const usableWidth = width - padding * 2;

  // 🔥 CREATE POINTS
  // 🔥 FIND MAX DIFFICULTY (AUTO SCALE)
const maxDifficulty = Math.max(...tasks.map(t => t.difficulty), 10);

// 🔥 CREATE POINTS (DYNAMIC HEIGHT)
const points = tasks.map((t, i) => {
  const x = tasks.length === 1
    ? width / 2
    : padding + (i / (tasks.length - 1)) * usableWidth;

  // normalize based on max difficulty
  const normalized = t.difficulty / maxDifficulty;

  const y = height - (normalized * (height - 100)) - 40;

  return { x, y };
});

  // 🔥 GRADIENT
  const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
  defs.innerHTML = `
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>`;
  svg.appendChild(defs);

  // 🔥 SHARP MOUNTAIN PATH
  let path = `M 0 ${height}`;

  points.forEach(p => {
    path += ` L ${p.x} ${p.y}`;
  });

  path += ` L ${width} ${height} Z`;

  const mountain = document.createElementNS("http://www.w3.org/2000/svg", "path");
  mountain.setAttribute("d", path);
  mountain.setAttribute("fill", "url(#grad)");
  svg.appendChild(mountain);

  // 🔥 VERTICAL LINES
  points.forEach(p => {
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", p.x);
    line.setAttribute("y1", p.y);
    line.setAttribute("x2", p.x);
    line.setAttribute("y2", height);
    line.setAttribute("stroke", "#334155");
    line.setAttribute("stroke-dasharray", "4");
    svg.appendChild(line);
  });

  // 🔥 POINTS + CLICK LOGIC
  const firstPending = tasks.findIndex(t => !t.done);

  points.forEach((p, i) => {
    const task = tasks[i];

    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", p.x);
    circle.setAttribute("cy", p.y);

    if (task.done) {
      circle.setAttribute("fill", "#22c55e");
      circle.setAttribute("r", 6);
    } else if (i === firstPending) {
      circle.setAttribute("fill", "#facc15");
      circle.setAttribute("r", 8);
    } else {
      circle.setAttribute("fill", "#64748b");
      circle.setAttribute("r", 6);
      circle.setAttribute("opacity", "0.5");
    }

    circle.onclick = () => {
  if (i === firstPending) task.done = true;
  else if (i === firstPending - 1) task.done = false;

  save();
  renderGoals();     // 🔥 UPDATE BATTERY
  renderMountain();
};


    svg.appendChild(circle);

    // LABEL
    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", p.x);
    text.setAttribute("y", p.y - 10);
    text.setAttribute("text-anchor", "middle");
    text.setAttribute("fill", "#e2e8f0");
    text.setAttribute("font-size", "12");
    text.setAttribute("font-weight", "600");
    text.textContent = task.name.slice(0, 10);
    svg.appendChild(text);
  });

  // 🔥 STATS
  const completed = tasks.filter(t => t.done).length;
  const progress = completed / tasks.length;

  completedCount.innerText = completed;
  pendingCount.innerText = tasks.length - completed;
  currentTask.innerText =
    firstPending !== -1 ? tasks[firstPending].name : "Done";
  progressPercent.innerText = Math.round(progress * 100) + "%";

  // 🔥 BATTERY
  updateBattery(progress);

  lucide.createIcons();
}

function save() {
  localStorage.setItem("goals", JSON.stringify(goals));
}

renderGoals();

if (goals.length > 0) {
  currentGoalIndex = 0;
  renderGoals();
  renderMountain();
}
</script>

</body>
</html>
