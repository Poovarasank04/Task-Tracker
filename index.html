<!DOCTYPE html>
<html>
<head>
<title>Goal Mountain Pro++</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  font-family: system-ui;
  display: none;
}

/* NAVBAR */
.navbar {
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 8px;
  background: rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-weight: bold;
}

/* LAYOUT */
.app {
  display: flex;
  height: calc(100vh - 60px);
}

.goalIcon {
  width: 16px;
  height: 16px;
  object-fit: contain;
  filter: brightness(1.2); /* makes it visible on dark bg */
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-right: 1px solid rgba(255,255,255,0.1);
}

.goal {
  padding: 10px;
  margin: 5px 0;
  background: rgba(220, 208, 208, 0.08);
  border-radius: 8px;
  cursor: pointer;
}

.goal.active {
  background: #16a34a;
}

.goalItem {
  display: flex;
  align-items: center;
  justify-content: space-between; /* IMPORTANT */
}

.goal.active img {
  filter: brightness(2);
}

/* FIX ICON SIZE */
svg.lucide {
  width: 18px;
  height: 18px;
}

/* SEGMENT BATTERY */
/* PROFESSIONAL BATTERY */
.battery {
  width: 100%;
  height: 28px;              /* ↓ reduced from ~44 */
  border-radius: 8px;
  padding: 3px;              /* ↓ tighter */
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: inset 0 0 6px rgba(0,0,0,0.4);
}

.battery-level {
  display: flex;
  gap: 5px;                 /* ↓ smaller gap */
  height: 100%;
}

.segment {
  flex: 1;
  border-radius: 4px;       /* ↓ sharper look */
  background: #1e293b;
  transition: all 0.3s ease;
}

/* glow fill */
.segment.active::after {
  content: "";
  position: absolute;
  inset: 0;
  background: inherit;
  opacity: 0.8;
  filter: blur(6px);
}

/* COLORS */
.red {
  background: linear-gradient(180deg,#ef4444,#7f1d1d);
}

.yellow {
  background: linear-gradient(180deg,#facc15,#854d0e);
}

.green {
  background: linear-gradient(180deg,#22c55e,#14532d);
}

.batteryText {
  margin-top: 5px;          /* ↓ closer to battery */
  font-size: 12px;          /* ↓ smaller text */
  color: #cbd5f5;
}
/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

input, button {
  padding: 8px;
  border-radius: 6px;
  border: none;
  margin: 5px;
}

button {
  background: #16a34a;
  color: white;
}

/* GRAPH */
svg {
  width: 100%;
  height: 340px;
  background: #020617;
  border-radius: 12px;
}

.goalInput{
  background: rgba(220, 208, 208, 0.08);
  color: #e2e8f0;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-top: 20px;
}

.card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
}

.goalItem {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.goalLeft {
  display: flex;
  align-items: center;
  gap: 10px;
}

.taskForm {
  margin-top: 20px;
  padding: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  display: flex;
  gap: 10px;
  align-items: center;
}

.taskForm input {
  flex: 1;
}

.taskForm button {
  white-space: nowrap;
}

.icon {
  width: 20px;
  height: 20px;
}

.miniBattery {
  display: flex;
  gap: 2px;
}

.miniSeg {
  width: 6px;
  height: 14px;
  border-radius: 2px;
  background: #1e293b;
  transition: all 0.3s ease;
}

.miniSeg.red { background: #ef4444; }
.miniSeg.yellow { background: #facc15; }
.miniSeg.green { background: #22c55e; }

.deleteIcon {
  width: 18px;
  height: 18px;
  color: #f87171;          /* brighter red */
  cursor: pointer;
  opacity: 1;
  padding: 4px;
  border-radius: 6px;
  object-fit: contain;

  stroke-width: 2.5;       /* 🔥 thicker icon */
  transition: all 0.2s ease;
}

.iconBox {
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.06);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.iconImg {
  width: 20px;
  height: 20px;
  filter: brightness(1.5) contrast(1.3)
          drop-shadow(0 0 6px rgba(59,130,246,0.6));
}

.deleteIcon:hover {
  color: black;
  opacity: 1;
  transform: scale(1.2);
  filter: drop-shadow(0 0 6px rgba(239,68,68,0.6));
  background: rgba(239,68,68,0.15);
}

.logoImg {
  height: 26px;   /* was ~34 → reduced */
  width: auto;
  object-fit: contain;

  margin-right: 6px;

  /* keep it sharp but not glowing too much */
  filter: brightness(1.05) contrast(1.05);
   height: 32px;
  opacity: 0.9;
  filter: drop-shadow(0 0 6px rgba(34,197,94,0.3));
}

#toastMsg {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: #020617;
  color: #e2e8f0;
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid #334155;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 999;
}

#toastMsg.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.35s ease;
}

.value {
  font-size: 18px;
  font-weight: bold;
  color: #e2e8f0;
}

.label {
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div id="toastMsg"></div>

<div class="navbar">
  <img src="icons/mountain.png" class="logoImg">
  <span>Mounty-tracker</span>

  <div style="margin-left:auto;">
    <button id="loginBtn" onclick="goLogin()">Sign In</button>

    <div id="userBox" style="display:none; align-items:center; gap:10px;">
      <span id="userEmail"></span>

    </div>

</div>


<div class="app">

<div class="sidebar">
  <h3>Goals</h3>

   <br>

  <input class="goalInput" id="goalInput" placeholder="New goal">

</div>

<div class="main">

  <button onclick="addTask()">Add Task</button>

  <svg id="mountain"></svg>

  <div class="stats">
    <div class="card">
      <div class="iconBox">
  <img src="icons/count.png" class="iconImg">
</div>
      <div>
        <div class="label">Completed</div>
        <div class="value" id="completedCount">0</div>
      </div>
    </div>

    <div class="card">
      <div class="iconBox">
  <img src="icons/current.png" class="iconImg">
</div>
      <div>
        <div class="label">Current</div>
        <div class="value" id="currentTask">-</div>
      </div>
    </div>

    <div class="card">
      <div class="iconBox">
  <img src="icons/pending.png" class="iconImg">
</div>
      <div>
        <div class="label">Pending</div>

    <div class="card">
      <div class="iconBox">
  <img src="icons/progress.png" class="iconImg">
</div>
      <div>

        <div class="value" id="progressPercent">0%</div>
      </div>
    </div>
  </div>

</div>
</div>

<script>
let goals = JSON.parse(localStorage.getItem("goals")) || [];
let currentGoalIndex = null;

function goLogin() {
  window.location.href = "login.html";
}

function goSignup() {
  window.location.href = "signup.html";
}

function addGoal() {
  const name = goalInput.value;
  if (!name) return;
  goals.push({ title: name, tasks: [] });
  goalInput.value = "";
  save();
  renderGoals();
}

function getPoints(tasks, width, height) {
  const paddingX = 50;
  const paddingY = 40;

  const usableWidth = width - paddingX * 2;
  const stepX = tasks.length > 1 ? usableWidth / (tasks.length - 1) : 0;

  return tasks.map((t, i) => {
    const x = paddingX + i * stepX;

    // scale difficulty dynamically
    const y =
      height -
      paddingY -
      (Math.min(t.difficulty, 10) / 10) * (height - 100);

    return { x, y };
  });
}

function generateMiniBattery(tasks) {
  if (!tasks.length) return "";

  const completed = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const progress = completed / total;

  const segments = 5;
  const active = Math.round(progress * segments);

  // 🔥 RANGE BASED COLOR
  const percent = progress * 100;

  let color = "red";
  if (percent > 30 && percent <= 60) color = "yellow";
  else if (percent > 60) color = "green";

  let html = "";

  for (let i = 0; i < segments; i++) {
    html += `<div class="miniSeg ${i < active ? color : ""}"></div>`;
  }

  return html;
}

function shakeNode(el, message = "Invalid action") {
  el.animate([
    { transform: "translateX(0)" },
    { transform: "translateX(-4px)" },
    { transform: "translateX(4px)" },
    { transform: "translateX(-3px)" },
    { transform: "translateX(3px)" },
    { transform: "translateX(0)" }
  ], {
    duration: 300,
    iterations: 1
  });

  showMessage(message);
}

function showMessage(text) {
  const msg = document.getElementById("toastMsg");
  msg.innerText = text;
  msg.classList.add("show");

  setTimeout(() => {
    msg.classList.remove("show");
  }, 1500);
}

function triggerShake() {
  const el = document.getElementById("mountain");

  el.classList.add("shake");

  setTimeout(() => {
    el.classList.remove("shake");
  }, 350);
}

function renderGoals() {
  goalList.innerHTML = "";

  goals.forEach((g, i) => {
    const div = document.createElement("div");
    div.className = "goal " + (i === currentGoalIndex ? "active" : "");

    div.innerHTML = `
    <div class="goalItem">

      <div class="goalLeft">
        <img src="icons/goal.png" class="goalIcon">
        <span>${g.title}</span>
      </div>

      <div style="display:flex; align-items:center; gap:10px;">
        <div class="miniBattery">
          ${generateMiniBattery(g.tasks)}
        </div>

        <!-- DELETE BUTTON -->
        <img src="icons/trash.png" class="deleteIcon">
      </div>

    </div>
  `;

    // delete button
    div.querySelector(".deleteIcon").onclick = (e) => {
      e.stopPropagation(); // prevent selecting goal

      if (confirm("Delete this goal?")) {
        goals.splice(i, 1);

        // reset selection safely
        if (currentGoalIndex === i) currentGoalIndex = null;
        else if (currentGoalIndex > i) currentGoalIndex--;

        save();
        renderGoals();
        renderMountain();
      }
    };

    div.onclick = () => {
      currentGoalIndex = i;
      renderGoals();
      renderMountain();
    };

    goalList.appendChild(div);
  });
}

function addTask() {
  if (currentGoalIndex === null) return;

  const name = taskName.value;
  const difficulty = parseInt(document.getElementById("difficulty").value);

  if (!name || !difficulty) return;

  goals[currentGoalIndex].tasks.push({ name, difficulty, done: false });

  taskName.value = "";
  document.getElementById("difficulty").value = "";

  save();
renderGoals();      // 🔥 THIS WAS MISSING
renderMountain();
}


function renderMountain() {
  const svg = document.getElementById("mountain");
  svg.innerHTML = "";

  if (currentGoalIndex === null) return;

  const goal = goals[currentGoalIndex];
  goalTitle.innerText = goal.title;

  const tasks = goal.tasks;
  if (!tasks.length) return;

  const width = svg.clientWidth;
  const height = 340;

  const padding = 60;
  const usableWidth = width - padding * 2;

  // 🔥 CREATE POINTS
  // 🔥 FIND MAX DIFFICULTY (AUTO SCALE)
const maxDifficulty = Math.max(...tasks.map(t => t.difficulty), 10);

// 🔥 CREATE POINTS (DYNAMIC HEIGHT)
const points = tasks.map((t, i) => {
  const x = tasks.length === 1
    ? width / 2
    : padding + (i / (tasks.length - 1)) * usableWidth;

  // normalize based on max difficulty
  const normalized = t.difficulty / maxDifficulty;

  const y = height - (normalized * (height - 100)) - 40;

  return { x, y };
});

  // 🔥 GRADIENT
  const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
  defs.innerHTML = `
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>`;
  svg.appendChild(defs);

  // 🔥 SHARP MOUNTAIN PATH
  let path = `M 0 ${height}`;

  points.forEach(p => {
    path += ` L ${p.x} ${p.y}`;
  });

  path += ` L ${width} ${height} Z`;

  const mountain = document.createElementNS("http://www.w3.org/2000/svg", "path");
  mountain.setAttribute("d", path);
  mountain.setAttribute("fill", "url(#grad)");
  svg.appendChild(mountain);

  // 🔥 VERTICAL LINES
  points.forEach(p => {
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", p.x);
    line.setAttribute("y1", p.y);
    line.setAttribute("x2", p.x);
    line.setAttribute("y2", height);
    line.setAttribute("stroke", "#334155");
    line.setAttribute("stroke-dasharray", "4");
    svg.appendChild(line);
  });

  // 🔥 POINTS + CLICK LOGIC
  const firstPending = tasks.findIndex(t => !t.done);

points.forEach((p, i) => {
  const task = tasks[i];

  // 🔥 GROUP (important)
  const group = document.createElementNS("http://www.w3.org/2000/svg", "g");

  // 🔥 MAIN CIRCLE
  const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  circle.setAttribute("cx", p.x);
  circle.setAttribute("cy", p.y);
  circle.setAttribute("r", 8);
  circle.style.cursor = "pointer";

  if (task.done) {
    circle.setAttribute("fill", "#22c55e");
  } else if (i === firstPending) {
    circle.setAttribute("fill", "#facc15");
  } else {
    circle.setAttribute("fill", "#64748b");
    circle.setAttribute("opacity", "0.5");
  }

    // ⭐ highlight last node when all tasks complete
  if (firstPending === -1 && i === tasks.length - 1) {
    circle.setAttribute("stroke", "#22c55e");
    circle.setAttribute("stroke-width", "3");
  }

  group.appendChild(circle);

  // 🔥 TOOLTIP BOX
const tooltip = document.createElementNS("http://www.w3.org/2000/svg", "g");
tooltip.style.display = "none";

    // background
    const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    bg.setAttribute("x", p.x - 45);
    bg.setAttribute("y", p.y - 55);
    bg.setAttribute("width", 90);
    bg.setAttribute("height", 36);
    bg.setAttribute("rx", 8);


    bg.setAttribute("fill", "#020617");
    bg.setAttribute("stroke", "#334155");

    // COMPLETE BUTTON
    const completeText = document.createElementNS("http://www.w3.org/2000/svg", "text");
    completeText.setAttribute("x", p.x - 20);
    completeText.setAttribute("y", p.y - 32);
    completeText.setAttribute("fill", task.done ? "#475569" : "#22c55e"); // disabled if done
    completeText.setAttribute("font-size", "11");
    completeText.style.cursor = task.done ? "not-allowed" : "pointer";
    completeText.textContent = "✔";

    // UNDO BUTTON
    const undoText = document.createElementNS("http://www.w3.org/2000/svg", "text");
    undoText.setAttribute("x", p.x + 10);
    undoText.setAttribute("y", p.y - 32);
    undoText.setAttribute("fill", task.done ? "#facc15" : "#475569"); // enabled only if done
    undoText.setAttribute("font-size", "11");
    undoText.style.cursor = task.done ? "pointer" : "not-allowed";
    undoText.textContent = "⏸";

    tooltip.appendChild(bg);
    tooltip.appendChild(completeText);
    tooltip.appendChild(undoText);

    group.appendChild(tooltip);

  let hoverTimeout;

  group.addEventListener("mouseenter", () => {
    clearTimeout(hoverTimeout);
    tooltip.style.display = "block";
  });

  group.addEventListener("mouseleave", () => {
    hoverTimeout = setTimeout(() => {
      tooltip.style.display = "none";
    }, 200); // delay gives time to reach buttons
  });

  // COMPLETE CLICK
completeText.onclick = (e) => {
  e.stopPropagation();

  if (task.done) return; // disabled

  // only allow next pending
  // trying to skip task
if (i !== firstPending) {
  shakeNode(circle, "Complete previous task first");
  return;
}

  task.done = true;
  save();
  renderGoals();
  renderMountain();
};

// UNDO CLICK
undoText.onclick = (e) => {
  e.stopPropagation();

  if (!task.done) return; // disabled

  // only allow undo last completed
  const lastCompleted = tasks.map(t => t.done).lastIndexOf(true);

  // wrong undo
if (i !== lastCompleted) {
  shakeNode(circle, "Undo latest task only");
  return;
}

  task.done = false;
  save();
  renderGoals();
  renderMountain();
};


  // 🔥 CLICK LOGIC
  group.onclick = () => {
  const firstPending = tasks.findIndex(t => !t.done);

  // 🔥 CASE 1: still tasks pending
  if (firstPending !== -1) {

    if (i === firstPending) {
      task.done = true;
    }
    else if (i === firstPending - 1) {
      task.done = false;
    }
    else {
      triggerShake();
      return;
    }

  } 
  // 🔥 CASE 2: ALL COMPLETED → allow undo last task
  else {
    if (i === tasks.length - 1) {
      task.done = false;
    } else {
      triggerShake();
      return;
    }
  }

  save();
  renderGoals();
  renderMountain();
};

  svg.appendChild(group);

    // LABEL
    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
    text.setAttribute("x", p.x);
    text.setAttribute("y", p.y - 10);
    text.setAttribute("text-anchor", "middle");
    text.setAttribute("fill", "#e2e8f0");
    text.setAttribute("font-size", "12");
    text.setAttribute("font-weight", "600");
    text.textContent = task.name.slice(0, 10);
    svg.appendChild(text);
  });

  // 🔥 STATS
  const completed = tasks.filter(t => t.done).length;
  const progress = completed / tasks.length;

  completedCount.innerText = completed;
  pendingCount.innerText = tasks.length - completed;
  currentTask.innerText =
    firstPending !== -1 ? tasks[firstPending].name : "Done";
  progressPercent.innerText = Math.round(progress * 100) + "%";

}

function save() {
  localStorage.setItem("goals", JSON.stringify(goals));
}

renderGoals();

if (goals.length > 0) {
  currentGoalIndex = 0;
  renderGoals();
  renderMountain();
}
</script>

</body>
