<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
  background:#020617;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:system-ui;
}

.box {
  background:#0f172a;
  padding:30px;
  border-radius:12px;
  width:280px;
}

input,button {
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:6px;
  border:none;
}

button {
  background:#22c55e;
  color:white;
}

.link {
  color:#38bdf8;
  cursor:pointer;
  font-size:13px;
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="box">
  <h3>Login</h3>

  <!-- 🔥 username OR email -->
  <input id="identifier" placeholder="Email or Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="goSignup()">Create Account</button>

  <button onclick="login()">Login</button>
  <button onclick="googleLogin()">Login with Google</button>

  <div class="link" onclick="goSignup()">Don't have account? Sign up →</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCD4VCZqadBElJhw6MilaFl2TomAHfxdmA",
  authDomain: "mounty-tracker.firebaseapp.com",
  projectId: "mounty-tracker",
  storageBucket: "mounty-tracker.appspot.com",
  messagingSenderId: "978463913179",
  appId: "1:978463913179:web:b5e9e4928b1c9cc8e888fe"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// =======================
// 🔑 LOGIN (USERNAME OR EMAIL)
// =======================
window.login = async () => {
  let identifier = document.getElementById("identifier").value.trim().toLowerCase();
  const pass = document.getElementById("password").value.trim();

  if (!identifier || !pass) {
    alert("Enter username/email & password");
    return;
  }

  let email = identifier;

  try {
    // 🔥 if username → convert to email using O(1)
    if (!identifier.includes("@")) {
      const ref = doc(db, "usernames", identifier);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        alert("Username not found");
        return;
      }

      const uid = snap.data().uid;

      // 🔥 get user email
      const userDoc = await getDoc(doc(db, "users", uid));
      email = userDoc.data().email;
    }

    await signInWithEmailAndPassword(auth, email, pass);

    window.location.href = "index.html";

  } catch (e) {
    console.error(e);
    alert(e.message);
  }
};


// =======================
// 🔐 GOOGLE LOGIN
// =======================
window.googleLogin = async () => {
  const provider = new GoogleAuthProvider();

  provider.setCustomParameters({
    prompt: "select_account"
  });

  try {
    await signInWithPopup(auth, provider);
    window.location.href = "index.html";
  } catch (e) {
    alert(e.message);
  }
};


// =======================
// 🔁 NAVIGATION
// =======================
window.goSignup = () => {
  window.location.href = "signup.html";
};


// =======================
// 👤 AUTO REDIRECT
// =======================
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "index.html";
  }
});

</script>

</body>
</html>
