<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
  background:#020617;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:system-ui;
}

.box {
  background:#0f172a;
  padding:30px;
  border-radius:12px;
  width:280px;
}

input,button {
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:6px;
  border:none;
}

button {
  background:#22c55e;
  color:white;
}

.link {
  color:#38bdf8;
  cursor:pointer;
  font-size:13px;
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="box">
  <h3>Login</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <!-- 🔁 Redirect instead of broken register -->
  <button onclick="goSignup()">Create Account</button>

  <button onclick="login()">Login</button>
  <button onclick="googleLogin()">Login with Google</button>

  <div class="link" onclick="goSignup()">Don't have account? Sign up →</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

// ✅ Correct config
const firebaseConfig = {
  apiKey: "AIzaSyCD4VCZqadBElJhw6MilaFl2TomAHfxdmA",
  authDomain: "mounty-tracker.firebaseapp.com",
  projectId: "mounty-tracker",
  storageBucket: "mounty-tracker.appspot.com",
  messagingSenderId: "978463913179",
  appId: "1:978463913179:web:b5e9e4928b1c9cc8e888fe"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// =======================
// 🔑 EMAIL LOGIN
// =======================
window.login = async () => {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!email || !pass) {
    alert("Enter email & password");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = "index.html";
  } catch (e) {
    console.error(e);
    alert(e.message);
  }
};

// =======================
// 🔐 GOOGLE LOGIN
// =======================
window.googleLogin = async () => {
  const provider = new GoogleAuthProvider();

  provider.setCustomParameters({
    prompt: "select_account"
  });

  try {
    await signInWithPopup(auth, provider);
    window.location.href = "index.html";
  } catch (e) {
    alert(e.message);
  }
};

// =======================
// 🔁 NAVIGATION
// =======================
window.goSignup = () => {
  window.location.href = "signup.html";
};

// =======================
// 👤 AUTO REDIRECT IF ALREADY LOGGED IN
// =======================
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "index.html";
  }
});
</script>

</body>
</html>
