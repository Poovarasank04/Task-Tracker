<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<style>
body {
  background:#020617;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:system-ui;
}

.box {
  background:#0f172a;
  padding:30px;
  border-radius:12px;
  width:280px;
}

input,button {
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:6px;
  border:none;
}

button {
  background:#22c55e;
  color:white;
}
.link {
  color:#38bdf8;
  cursor:pointer;
  font-size:13px;
}
</style>
</head>

<body>

<div class="box">
  <h3>Sign Up</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Create Account</button>
  <button onclick="googleSignup()">Sign up with Google</button>

  <div class="link" onclick="goLogin()">Already have account →</div>
</div>

<script type="module">

import {
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

window.googleSignup = async () => {
  const provider = new GoogleAuthProvider();

  try {
    await signInWithPopup(auth, provider);
    alert("Google account created");
    window.location.href = "index.html";
  } catch (e) {
    console.error(e);
    alert(e.message);
  }
};
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCD4VCZqadBElJhw6MilaFl2TomAHfxdmA",
  authDomain: "mounty-tracker.firebaseapp.com",
  projectId: "mounty-tracker",
  storageBucket: "mounty-tracker.appspot.com",
  messagingSenderId: "978463913179",
  appId: "1:978463913179:web:b5e9e4928b1c9cc8e888fe",
  measurementId: "G-6PY52GQ6XV"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = async () => {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!email || !pass) {
    alert("Enter email & password");
    return;
  }

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    alert("Account created");
    window.location.href = "index.html";
  } catch (e) {
    console.error(e);
    alert(e.message);
  }
};

window.goLogin = () => location.href = "login.html";
</script>

</body>
</html>
